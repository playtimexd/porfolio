<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Nova · Behaviour NASA</title>
<meta name="theme-color" content="#08080f">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%235eead4'/%3E%3Cstop offset='1' stop-color='%2319c6d6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M8 1 L9.3 6.7 L15 8 L9.3 9.3 L8 15 L6.7 9.3 L1 8 L6.7 6.7 Z' fill='url(%23g)'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg:#08080f; --panel:#12131c; --panel-2:#1a1c28; --border:#282a3c; --text:#ecedf5; --text-dim:#9698b4; --accent:#19c6d6; --accent-2:#5eead4; }
html, body { height: 100%; }
body {
  background:
    radial-gradient(ellipse 70% 55% at 50% -8%, rgba(25,198,214,.22), transparent),
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 70% 22%, rgba(255,255,255,.45), transparent),
    radial-gradient(1px 1px at 42% 70%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,.35), transparent),
    var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex; align-items: center; justify-content: center;
}
.card {
  width: 360px; max-width: calc(100vw - 40px);
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 16px; padding: 30px 28px;
  box-shadow: 0 20px 70px rgba(0,0,0,.55);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; }
.brand svg { width: 24px; height: 24px; filter: drop-shadow(0 0 7px rgba(25,198,214,.7)); }
.brand em { color: var(--text-dim); font-style: normal; font-weight: 500; font-size: 11px; letter-spacing: .5px; text-transform: uppercase; }
.sub { color: var(--text-dim); font-size: 13px; margin: 14px 0 22px; line-height: 1.5; }
.ms {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 12px; border-radius: 10px; cursor: pointer;
  background: #fff; color: #1b1b1b; border: none; font-size: 14px; font-weight: 600; text-decoration: none;
}
.ms:hover { opacity: .92; }
.sep { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 11px; margin: 18px 0; }
.sep::before, .sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin: 0 0 5px; }
input {
  width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  border-radius: 9px; padding: 11px 12px; font-size: 14px; margin-bottom: 12px;
}
input:focus { outline: none; border-color: var(--accent); }
.go {
  width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), #0c7f92); color: #04121a; font-weight: 700; font-size: 14px;
}
.go:hover { opacity: .92; }
.err { color: #ff9aa8; font-size: 12.5px; margin-top: 10px; min-height: 16px; }
.foot { margin-top: 20px; font-size: 11px; color: var(--text-dim); text-align: center; }
#dev-block[hidden] { display: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 16 16"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#19c6d6"/></linearGradient></defs><path d="M8 0.5 L9.5 6.5 L15.5 8 L9.5 9.5 L8 15.5 L6.5 9.5 L0.5 8 L6.5 6.5 Z" fill="url(#lg)"/></svg>
      Nova <em>· Behaviour NASA</em>
    </div>
    <p class="sub">Sign in to your creative canvas.</p>

    <a class="ms" href="/auth/login">
      <svg width="16" height="16" viewBox="0 0 16 16"><rect x="0" y="0" width="7" height="7" fill="#f25022"/><rect x="9" y="0" width="7" height="7" fill="#7fba00"/><rect x="0" y="9" width="7" height="7" fill="#00a4ef"/><rect x="9" y="9" width="7" height="7" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </a>

    <div id="dev-block" hidden>
      <div class="sep">or dev sign-in</div>
      <form id="dev-form">
        <label>Work email</label>
        <input id="email" type="email" placeholder="you@bhvr.com" autocomplete="email" required>
        <label>Display name (optional)</label>
        <input id="name" type="text" placeholder="Your name" autocomplete="name">
        <button class="go" type="submit">Continue →</button>
        <div class="err" id="err"></div>
      </form>
    </div>

    <div class="foot">Nova — part of NASA, Behaviour Interactive's applied-AI program.</div>
  </div>

<script>
(async function () {
  // show the dev form only when the server is in dev auth mode
  let mode = 'dev';
  try { const r = await fetch('/api/auth/me'); mode = (await r.json()).authMode || 'dev'; } catch {}
  if (mode === 'dev') document.getElementById('dev-block').hidden = false;
  document.getElementById('dev-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const name = document.getElementById('name').value.trim();
    const err = document.getElementById('err');
    err.textContent = '';
    try {
      const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, name }) });
      const d = await r.json();
      if (!r.ok) { err.textContent = d.error || 'Sign-in failed'; return; }
      location.href = '/';
    } catch (e2) { err.textContent = 'Sign-in failed'; }
  });
})();
</script>
</body>
</html>
